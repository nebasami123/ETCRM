services:
  postgres:
    image: postgres:18
    container_name: etcrm-postgres
    environment:
      POSTGRES_USER: etcrm
      POSTGRES_PASSWORD: etcrm
      POSTGRES_DB: etcrm_dev
    ports:
      - "5433:5432"
    volumes:
      - etcrm_postgres_data:/var/lib/postgresql
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etcrm -d etcrm_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  etcrm_postgres_data:
