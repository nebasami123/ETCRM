name: Build, migrate, and deploy API

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/nebasami123/etcrm-api

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - name: Build image
        run: docker build --build-arg APP_VERSION=0.1.0 --build-arg BUILD_COMMIT=${{ github.sha }} -t ${{ env.IMAGE_NAME }}:latest -t ${{ env.IMAGE_NAME }}:main-${{ github.sha }} .

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push verified image
        run: |
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:main-${{ github.sha }}

      - name: Trigger Dokploy rollout
        env:
          DOKPLOY_DEPLOY_WEBHOOK: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}
        run: curl --fail --silent --show-error -X POST "$DOKPLOY_DEPLOY_WEBHOOK"
